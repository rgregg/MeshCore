# Telegraf configuration for MeshCore MQTT telemetry -> InfluxDB
#
# Subscribes to MQTT topics published by MeshCore ETH-enabled repeaters
# and room servers, parses the payloads, and writes to InfluxDB for
# Grafana dashboards.
#
# Topic structure: meshcore/{public_key_hex}/...
# The + wildcard matches the 64-character hex public key of each node.
#
# Usage:
#   telegraf --config telegraf-meshcore.conf
#
# Required environment variables:
#   INFLUXDB_URL     - e.g. http://localhost:8086
#   INFLUXDB_TOKEN   - InfluxDB auth token
#   INFLUXDB_ORG     - InfluxDB organization
#   INFLUXDB_BUCKET  - InfluxDB bucket (default: meshcore)
#
# Optional environment variables:
#   MQTT_BROKER      - default: tcp://127.0.0.1:1883
#   MQTT_USERNAME    - MQTT auth (optional)
#   MQTT_PASSWORD    - MQTT auth (optional)

# ─────────────────────────────────────────────
# Global agent settings
# ─────────────────────────────────────────────
[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

# ─────────────────────────────────────────────
# Output: InfluxDB v2
# ─────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "MeshCore"

# ─────────────────────────────────────────────
# Node config: name, firmware, radio params (retained)
# ─────────────────────────────────────────────
# {"name":"MyNode","firmware":"v1.14.0","build_date":"6 Mar 2026",
#  "role":"repeater","freq":915.0,"bw":250,"sf":10,"cr":5,
#  "tx_power":20,"lat":34.05,"lon":-118.24}
[[inputs.mqtt_consumer]]
  name_override = "meshcore_config"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/config"]
  topic_parsing = [
    { topic = "meshcore/+/config", tags = "_/node_id/_" },
  ]
  data_format = "json"
  tag_keys = ["name", "role", "firmware"]

# ─────────────────────────────────────────────
# Core stats: battery, uptime, errors, queue
# ─────────────────────────────────────────────
# {"battery_mv":4200,"uptime_secs":12345,"errors":0,"queue_len":2}
[[inputs.mqtt_consumer]]
  name_override = "meshcore_core"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/stats/core"]
  topic_parsing = [
    { topic = "meshcore/+/stats/core", tags = "_/node_id/_/_" },
  ]
  data_format = "json"

# ─────────────────────────────────────────────
# Radio stats: noise floor, RSSI, SNR, airtime
# ─────────────────────────────────────────────
# {"noise_floor":-115,"last_rssi":-60,"last_snr":8.5,"tx_air_secs":100,"rx_air_secs":200}
[[inputs.mqtt_consumer]]
  name_override = "meshcore_radio"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/stats/radio"]
  topic_parsing = [
    { topic = "meshcore/+/stats/radio", tags = "_/node_id/_/_" },
  ]
  data_format = "json"

# ─────────────────────────────────────────────
# Packet counters: recv, sent, flood/direct rx/tx
# ─────────────────────────────────────────────
# {"recv":500,"sent":200,"flood_tx":150,"direct_tx":50,"flood_rx":200,"direct_rx":100,"recv_errors":3}
[[inputs.mqtt_consumer]]
  name_override = "meshcore_packet_stats"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/stats/packets"]
  topic_parsing = [
    { topic = "meshcore/+/stats/packets", tags = "_/node_id/_/_" },
  ]
  data_format = "json"

# ─────────────────────────────────────────────
# Node status: online/offline (LWT)
# ─────────────────────────────────────────────
[[inputs.mqtt_consumer]]
  name_override = "meshcore_status"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/status"]
  topic_parsing = [
    { topic = "meshcore/+/status", tags = "_/node_id/_" },
  ]
  data_format = "value"
  data_type = "string"

# ─────────────────────────────────────────────
# Neighbors: JSON array of objects
# [{"id":"AABBCCDD","last_seen":120,"snr":2.25},...]
# ─────────────────────────────────────────────
[[inputs.mqtt_consumer]]
  name_override = "meshcore_neighbors"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/neighbors"]
  topic_parsing = [
    { topic = "meshcore/+/neighbors", tags = "_/node_id/_" },
  ]
  data_format = "json"
  tag_keys = ["id"]

# ─────────────────────────────────────────────
# Per-packet events (meshcoretomqtt-compatible)
# ─────────────────────────────────────────────
# {"origin":"node name","origin_id":"AABB...","timestamp":"2026-03-09T06:15:30",
#  "type":"PACKET","direction":"rx","len":"87","packet_type":"5","route":"F",
#  "payload_len":"83","raw":"0A1B...","SNR":"4","RSSI":"-93","score":"1000",
#  "hash":"AC9D2DDDD8395712","path":"C2 -> E2"}
#
# Note: meshcoretomqtt format uses string values for numbers.
# We parse as JSON, tag on key fields, then convert strings to integers.
[[inputs.mqtt_consumer]]
  name_override = "meshcore_packets"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/packets"]
  topic_parsing = [
    { topic = "meshcore/+/packets", tags = "_/node_id/_" },
  ]
  data_format = "json"
  tag_keys = ["direction", "packet_type", "route", "hash"]
  json_string_fields = ["raw", "path", "timestamp", "type"]

# ─────────────────────────────────────────────
# Advertisement events from mesh nodes
# ─────────────────────────────────────────────
# {"id":"AABB...","name":"NodeName","type":"repeater","timestamp":"2026-03-09T06:15:30",
#  "advert_ts":1741500930,"snr":8.5,"hops":1,"lat":34.05,"lon":-118.24}
[[inputs.mqtt_consumer]]
  name_override = "meshcore_adverts"
  servers = ["${MQTT_BROKER}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["meshcore/+/adverts"]
  topic_parsing = [
    { topic = "meshcore/+/adverts", tags = "_/node_id/_" },
  ]
  data_format = "json"
  tag_keys = ["id", "name", "type"]
